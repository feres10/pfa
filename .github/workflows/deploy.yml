name: Build, Push and Deploy Docker Images

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/feres10/esante-backend
  IMAGE_NAME_FRONTEND: ghcr.io/feres10/esante-frontend

jobs:

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # =========================
      # Checkout Repository
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Docker Buildx
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # Login to GitHub Container Registry
      # =========================
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Backend Metadata
      # =========================
      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      # =========================
      # Frontend Metadata
      # =========================
      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      # =========================
      # Build & Push Backend
      # =========================
      - name: Build and push Backend image
        id: docker_build_backend
        uses: docker/build-push-action@v5
        with:
          context: ./E_santeBackend
          file: ./E_santeBackend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # Build & Push Frontend
      # =========================
      - name: Build and push Frontend image
        id: docker_build_frontend
        uses: docker/build-push-action@v5
        with:
          context: ./E_santeFrontend_blazor
          file: ./E_santeFrontend_blazor/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # Show Digests
      # =========================
      - name: Image digest Backend
        run: echo "${{ steps.docker_build_backend.outputs.digest }}"

      - name: Image digest Frontend
        run: echo "${{ steps.docker_build_frontend.outputs.digest }}"

  deploy:
    name: Deploy Application
    needs: build-and-push

    runs-on: [self-hosted, linux]

    if: github.event_name != 'pull_request'

    steps:

      # =========================
      # Login to GHCR
      # =========================
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

      # =========================
      # Deploy Containers
      # =========================
      - name: Deploy with Docker Compose
        run: |
          cd /home/vm/deploy_pfa

          docker compose down

          docker compose pull

          docker compose up -d --remove-orphans

      # =========================
      # Cleanup unused images
      # =========================
      - name: Docker cleanup
        run: docker image prune -af

  notify:
    name: Notify Result

    needs:
      - build-and-push
      - deploy

    runs-on: ubuntu-latest

    if: always()

    steps:

      - name: Notify success
        if: success()
        run: |
          echo "✅ Build successful"
          echo "✅ Docker images pushed"
          echo "✅ Deployment completed"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Pipeline failed"
          exit 1
